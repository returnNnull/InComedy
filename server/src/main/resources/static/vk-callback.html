<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>InComedy Auth</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      color: #101828;
    }
    .card {
      width: min(92vw, 420px);
      background: white;
      border-radius: 14px;
      box-shadow: 0 12px 32px rgba(16, 24, 40, 0.08);
      padding: 20px;
      text-align: center;
    }
    .btn {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      background: #111827;
      color: white;
      font-weight: 600;
    }
    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #667085;
    }
  </style>
</head>
<body>
  <div class="card">
    <h3>InComedy Auth</h3>
    <p id="statusText">InComedy server</p>
    <a id="openAppButton" class="btn" href="#" style="display:none;">Open app</a>
    <div id="hintText" class="hint" style="display:none;">If redirect did not happen automatically, tap the button.</div>
  </div>
  <script>
    (function () {
      var search = window.location.search || "";
      var hash = window.location.hash || "";
      var parts = [];
      if (search.length > 1) parts.push(search.substring(1));
      if (hash.length > 1) parts.push(hash.substring(1));
      var query = parts.filter(Boolean).join("&");
      var params = new URLSearchParams(query);
      var hasVkPayload = params.has("code") && params.has("device_id");
      if (!hasVkPayload) return;

      var deepLinkTarget = "incomedy://auth/vk?" + query;
      var isAndroid = /android/i.test(window.navigator.userAgent || "");
      var openAppButton = document.getElementById("openAppButton");
      var hintText = document.getElementById("hintText");
      var statusText = document.getElementById("statusText");

      if (window.history && typeof window.history.replaceState === "function") {
        window.history.replaceState(null, "", "/auth/vk/callback");
      }

      function emitTelemetry(stage, launchMode) {
        var payload = new URLSearchParams();
        payload.set("stage", stage);
        payload.set("is_android", String(isAndroid));
        payload.set("has_query", String(search.length > 1));
        payload.set("has_fragment", String(hash.length > 1));
        payload.set("has_payload", String(hasVkPayload));
        payload.set("launch_mode", launchMode || "n/a");
        var beacon = new Image();
        beacon.src = "/auth/vk/callback/telemetry?" + payload.toString();
      }

      statusText.textContent = isAndroid
        ? "Tap Open app to finish signing in."
        : "Returning to InComedy app...";
      openAppButton.setAttribute("href", deepLinkTarget);
      openAppButton.style.display = "inline-block";
      hintText.textContent = isAndroid
        ? "If the app did not open automatically, tap the button to continue in InComedy."
        : "If redirect did not happen automatically, tap the button.";
      hintText.style.display = "block";
      emitTelemetry("bridge_loaded", isAndroid ? "manual_button" : "auto_deeplink");

      openAppButton.addEventListener("click", function () {
        emitTelemetry("open_app_clicked", isAndroid ? "manual_button" : "manual_deeplink");
      });

      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "hidden") {
          emitTelemetry("page_hidden", isAndroid ? "manual_button" : "auto_deeplink");
        }
      });
      window.addEventListener("pagehide", function () {
        emitTelemetry("page_hidden", isAndroid ? "manual_button" : "auto_deeplink");
      });

      window.setTimeout(function () {
        if (isAndroid) {
          emitTelemetry("manual_open_presented", "manual_button");
          return;
        }
        emitTelemetry("autolaunch_attempted", "auto_deeplink");
        window.location.replace(deepLinkTarget);
      }, 120);
    })();
  </script>
</body>
</html>
