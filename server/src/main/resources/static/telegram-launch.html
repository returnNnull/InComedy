<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="origin">
  <title>InComedy Telegram Login</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      color: #101828;
    }
    .card {
      width: min(92vw, 420px);
      background: white;
      border-radius: 14px;
      box-shadow: 0 12px 32px rgba(16, 24, 40, 0.08);
      padding: 20px;
      text-align: center;
    }
    .btn {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      background: #111827;
      color: white;
      font-weight: 600;
    }
    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #667085;
    }
  </style>
</head>
<body>
  <div class="card">
    <h3>InComedy Auth</h3>
    <p id="statusText">Preparing Telegram sign-in...</p>
    <a id="continueButton" class="btn" href="#" style="display:none;">Continue to Telegram</a>
    <div id="hintText" class="hint" style="display:none;"></div>
  </div>
  <script>
    (function () {
      var authUrl = __AUTH_URL__;
      var isAndroid = /android/i.test(window.navigator.userAgent || "");
      var statusText = document.getElementById("statusText");
      var continueButton = document.getElementById("continueButton");
      var hintText = document.getElementById("hintText");

      if (window.history && typeof window.history.replaceState === "function") {
        window.history.replaceState(null, "", "/auth/telegram/launch");
      }

      function emitTelemetry(stage, redirectMode) {
        var payload = new URLSearchParams();
        payload.set("stage", stage);
        payload.set("is_android", String(isAndroid));
        payload.set("has_auth_url", String(Boolean(authUrl)));
        payload.set("redirect_mode", redirectMode || "n/a");
        var beacon = new Image();
        beacon.src = "/auth/telegram/launch/telemetry?" + payload.toString();
      }

      if (!authUrl) {
        statusText.textContent = "Telegram sign-in link is invalid or expired.";
        hintText.textContent = "Return to InComedy and try again.";
        hintText.style.display = "block";
        emitTelemetry("launch_invalid", "n/a");
        return;
      }

      statusText.textContent = "Redirecting to Telegram...";
      hintText.textContent = "If nothing happens automatically, tap the button to continue.";
      hintText.style.display = "block";
      continueButton.setAttribute("href", authUrl);
      continueButton.style.display = "inline-block";
      emitTelemetry("launch_ready", "auto_redirect");

      continueButton.addEventListener("click", function () {
        emitTelemetry("continue_clicked", "manual_button");
      });

      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "hidden") {
          emitTelemetry("page_hidden", "auto_redirect");
        }
      });
      window.addEventListener("pagehide", function () {
        emitTelemetry("page_hidden", "auto_redirect");
      });

      window.setTimeout(function () {
        emitTelemetry("redirect_attempted", "auto_redirect");
        window.location.replace(authUrl);
      }, 120);
    })();
  </script>
</body>
</html>
