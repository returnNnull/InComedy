        assignable_permission_roles:
          type: array
          items:
            type: string
            enum: [owner, manager, checker, host]
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceMembershipResponse"
    WorkspaceMembershipResponse:
      type: object
      additionalProperties: false
      required:
        - membership_id
        - user_id
        - display_name
        - permission_role
        - status
        - is_current_user
        - can_edit_role
        - assignable_permission_roles
      properties:
        membership_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        display_name:
          type: string
        username:
          type: string
          nullable: true
        permission_role:
          type: string
          enum: [owner, manager, checker, host]
        status:
          type: string
