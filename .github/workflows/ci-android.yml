name: CI Android

on:
  pull_request:
    paths:
      - "composeApp/**"
      - "feature/auth/**"
      - "shared/**"
      - "data/**"
      - "core/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".github/workflows/ci-android.yml"
  push:
    branches: [ "main" ]
    paths:
      - "composeApp/**"
      - "feature/auth/**"
      - "shared/**"
      - "data/**"
      - "core/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".github/workflows/ci-android.yml"

concurrency:
  group: ci-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-ui-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android UI unit tests and compile composeApp
        run: ./gradlew :composeApp:testDebugUnitTest :composeApp:compileDebugKotlin --no-daemon
